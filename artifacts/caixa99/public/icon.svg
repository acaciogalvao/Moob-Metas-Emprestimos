<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0b0f19" />
  
  <!-- Outer glowing ring (dashboard representation) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#neonGlow)" stroke-width="12" stroke-dasharray="800 300" stroke-linecap="round" filter="url(#glow)" opacity="0.85" />
  
  <!-- Inner Steering wheel spoke design / bar chart -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Central hub -->
    <circle cx="0" cy="0" r="32" fill="#0b0f19" stroke="url(#neonGlow)" stroke-width="8" />
    
    <!-- Steering wheel spokes -->
    <path d="M -32 0 L -120 0" stroke="url(#neonGlow)" stroke-width="12" stroke-linecap="round" />
    <path d="M 32 0 L 120 0" stroke="url(#neonGlow)" stroke-width="12" stroke-linecap="round" />
    <path d="M 0 32 L 0 120" stroke="url(#neonGlow)" stroke-width="12" stroke-linecap="round" />
    
    <!-- Financial bar chart rising overlay -->
    <!-- Bar 1 -->
    <rect x="-80" y="-100" width="14" height="40" rx="4" fill="#06b6d4" opacity="0.9" />
    <!-- Bar 2 -->
    <rect x="-55" y="-120" width="14" height="60" rx="4" fill="url(#neonGlow)" />
    <!-- Bar 3 -->
    <rect x="-30" y="-140" width="14" height="80" rx="4" fill="#10b981" />
    
    <!-- Growth arrow -->
    <path d="M -85 -110 L -45 -135 L -15 -155" fill="none" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M -25 -155 L -15 -155 L -15 -145" fill="none" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
